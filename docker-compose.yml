services:
  postgres:
    image: postgres:15
    container_name: soundatlas_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-soundatlas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soundatlas_password}
      POSTGRES_DB: ${POSTGRES_DB:-soundatlas_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soundatlas_user} -d ${POSTGRES_DB:-soundatlas_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soundatlas_network

  redis:
    image: redis:7-alpine
    container_name: soundatlas_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soundatlas_network

  backend:
    build:
      context: ./backend
    container_name: soundatlas_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-soundatlas_user}:${POSTGRES_PASSWORD:-soundatlas_password}@postgres:5432/${POSTGRES_DB:-soundatlas_db}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - soundatlas_network

  frontend:
    build:
      context: ./frontend
    container_name: soundatlas_frontend
    env_file:
      - .env
    environment:
      API_URL: http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev
    networks:
      - soundatlas_network

volumes:
  postgres_data:
  redis_data:

networks:
  soundatlas_network:
    driver: bridge
